<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Center</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-2xl">

<h1 class="text-3xl font-bold text-center mb-2">
Upload Photos & Videos
</h1>

<p class="text-center text-gray-500 mb-6">
Upload directly to Nextcloud
</p>

<input
id="fileInput"
type="file"
multiple
class="block w-full border rounded-xl p-4 mb-4"
/>

<button
onclick="uploadFiles()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition"
>
Upload Files
</button>

<div id="status" class="mt-6 text-sm"></div>

</div>

<script>

const nextcloudUrl = "https://cloud.worawut1124it.uk";

/*
Token จาก Public Upload Link
https://cloud.worawut1124it.uk/index.php/s/TwZkarE7ySqjXKZ
*/

const shareToken = "TwZkarE7ySqjXKZ";

async function uploadFiles() {

    const files = document.getElementById('fileInput').files;
    const status = document.getElementById('status');

    status.innerHTML = "";

    for (const file of files) {

        const uploadUrl =
        `${nextcloudUrl}/public.php/dav/files/${shareToken}/${file.name}`;

        status.innerHTML +=
        `<p class="text-blue-600">
        Uploading ${file.name}...
        </p>`;

        try {

            const response = await fetch(uploadUrl, {
                method: 'PUT',
                body: file
            });

            if (response.ok) {

                const publicUrl =
                `${nextcloudUrl}/index.php/s/${shareToken}`;

                status.innerHTML += `
                <div class="mt-3 p-3 bg-green-100 rounded-xl">

                    <p class="font-bold text-green-700">
                    Upload Complete
                    </p>

                    <p class="break-all text-sm">
                    ${file.name}
                    </p>

                    <input
                    value="${publicUrl}"
                    readonly
                    class="w-full mt-2 border rounded p-2 text-sm"
                    />

                    <button
                    onclick="navigator.clipboard.writeText('${publicUrl}')"
                    class="mt-2 bg-black text-white px-4 py-2 rounded-lg"
                    >
                    Copy URL
                    </button>

                </div>
                `;

            } else {

                status.innerHTML += `
                <p class="text-red-600">
                Failed: ${file.name}
                </p>`;
            }

        } catch (err) {

            status.innerHTML += `
            <p class="text-red-600">
            Error: ${file.name}
            </p>`;
        }
    }
}

</script>

</body>
</html>
